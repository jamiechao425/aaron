<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AARON 結算分成管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        /* 優化手機點擊與輸入 */
        .input-focus:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-active { overflow: hidden; }
        
        /* 儲存提示 */
        #saveStatus { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- 保存狀態 -->
    <div id="saveStatus" class="fixed top-2 right-2 z-[60] px-2 py-1 rounded text-[9px] font-black uppercase bg-indigo-100 text-indigo-600 opacity-0 pointer-events-none">
        Saved Locally
    </div>

    <!-- 頂部導覽列 -->
    <nav class="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center text-left">
            <h1 class="text-lg font-black tracking-tighter flex items-center gap-2">
                <span class="bg-indigo-600 px-1.5 py-0.5 rounded text-xs">AARON</span>
                <span class="text-sm">結算分成管理</span>
            </h1>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Offline Ready</span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-3 space-y-4">
        
        <!-- 輸入區 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
            <div class="grid grid-cols-2 gap-3 mb-4 text-left">
                <div>
                    <label class="block text-slate-400 text-[9px] font-bold mb-1 uppercase">日期</label>
                    <input type="date" id="recordDate" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl input-focus text-sm">
                </div>
                <div>
                    <label class="block text-slate-400 text-[9px] font-bold mb-1 uppercase">遊戲帳號</label>
                    <input type="text" id="gameAccount" placeholder="帳號" autocomplete="off" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl input-focus text-sm font-bold">
                </div>
            </div>

            <div class="space-y-4 text-left">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-600 mb-1 block">玩家輸贏總額</label>
                        <input type="text" id="playerAmount" placeholder="0" autocomplete="off" inputmode="decimal"
                            class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl input-focus font-bold text-right"
                            onfocus="unformatAndSelect(this)" onblur="formatInput(this)" oninput="updatePreview()">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-600 mb-1 block">有效投注金額</label>
                        <input type="text" id="validBet" placeholder="0" autocomplete="off" inputmode="decimal"
                            class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl input-focus font-bold text-right"
                            onfocus="unformatAndSelect(this)" onblur="formatInput(this)" oninput="updatePreview()">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-indigo-600 mb-1 block flex justify-between">
                            <span>水錢趴數</span>
                            <span id="ratePercent" class="text-[10px] text-indigo-400">(= 0%)</span>
                        </label>
                        <input type="number" id="commissionRate" step="any" placeholder="0.0115" autocomplete="off" inputmode="decimal"
                            class="w-full px-3 py-3 bg-indigo-50 border border-indigo-100 rounded-xl input-focus font-black text-indigo-700 text-right" 
                            onfocus="this.select()" oninput="updatePreview()">
                    </div>
                </div>

                <!-- 黑色預覽面板 -->
                <div class="bg-slate-900 rounded-2xl p-4 text-white shadow-lg text-left">
                    <div class="grid grid-cols-3 gap-1 text-center">
                        <div>
                            <div class="text-slate-500 text-[8px] font-bold uppercase mb-1">1. 水錢</div>
                            <div id="previewCommission" class="text-xs font-bold text-yellow-400 font-mono">0</div>
                        </div>
                        <div class="border-x border-slate-800 px-1">
                            <div class="text-slate-500 text-[8px] font-bold uppercase mb-1">2. 扣水後</div>
                            <div id="previewAfterCom" class="text-xs font-bold text-slate-300 font-mono">0</div>
                        </div>
                        <div>
                            <div class="text-blue-400 text-[8px] font-bold uppercase mb-1">3. 月退 1</div>
                            <div id="previewRefund1" class="text-base font-black text-blue-400 font-mono">0</div>
                        </div>
                    </div>
                </div>

                <button onclick="addToLedger()" id="addBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-md transition-all active:scale-[0.97] flex items-center justify-center gap-2">
                    記錄此帳號
                </button>
            </div>
        </div>

        <!-- 帳本列表 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden text-left">
            <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                <h2 class="font-black text-slate-700 text-sm flex items-center gap-2">
                    <span class="w-1.5 h-4 bg-indigo-600 rounded-full"></span>
                    多人結算帳本
                </h2>
                <div id="recordCount" class="text-[9px] font-black text-slate-400 uppercase tracking-widest">0 Records</div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-xs">
                    <thead class="bg-slate-50 text-slate-400 font-bold border-b border-slate-100">
                        <tr>
                            <th class="p-3 text-left">帳號 / 日期</th>
                            <th class="p-3 text-right">水錢</th>
                            <th class="p-3 text-right">月退 1</th>
                            <th class="p-3 text-center">刪除</th>
                        </tr>
                    </thead>
                    <tbody id="ledgerBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
            <div id="noData" class="p-16 text-center text-slate-300 text-[10px] font-black uppercase tracking-widest hidden">
                目前尚無紀錄
            </div>
        </div>
    </div>

    <!-- 彈窗：詳細拆分 -->
    <div id="splitModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-3">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-slate-900 p-5 text-white flex justify-between items-center text-left">
                <div>
                    <h3 id="modalAccountTitle" class="text-base font-black">帳號名稱</h3>
                    <p id="modalRefundSub" class="text-blue-300 text-[10px] font-bold">月退 1 總額: 0</p>
                </div>
                <button onclick="closeSplitModal()" class="text-slate-500 hover:text-white p-2 text-xl">✕</button>
            </div>
            
            <div class="p-4 overflow-y-auto space-y-5 flex-grow text-left">
                <!-- 佔成比例 -->
                <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs font-black text-indigo-900 uppercase">代理佔成比例</span>
                        <span id="modalStandDisplay" class="text-xs font-black text-indigo-600">100%</span>
                    </div>
                    <div class="flex gap-3 items-center">
                        <input type="number" id="modalStandRate" step="any" inputmode="decimal"
                            class="flex-grow px-3 py-2 bg-white border border-indigo-200 rounded-xl input-focus font-black text-indigo-700" 
                            onfocus="this.select()" oninput="updateSplitCalculations()">
                        <div class="text-right">
                            <div class="text-[8px] text-indigo-400 font-bold uppercase">佔成總額</div>
                            <div id="modalAgentTotal" class="text-sm font-black text-indigo-600 font-mono">0</div>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-black text-slate-700">股東分潤細節</span>
                        <button onclick="addSplitRow()" class="text-[10px] bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-black">+ 新增</button>
                    </div>
                    <div id="splitRowsContainer" class="space-y-2"></div>
                    
                    <div class="mt-4 pt-4 border-t border-slate-100 space-y-3">
                        <div class="flex justify-between text-[10px] font-bold text-slate-400">
                            <span>月退 1 剩餘分配</span>
                            <span id="remainingPercent">100%</span>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 flex justify-between items-center">
                            <div class="text-[10px] font-black text-emerald-800 uppercase">代理實拿 <br><span class="font-normal text-[8px] text-emerald-600 text-left">扣除分潤後</span></div>
                            <div id="modalAgentOwn" class="text-xl font-black text-emerald-700 font-mono text-right">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-t border-slate-100">
                <button onclick="saveSplits()" id="saveBtn" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl text-sm active:bg-black">儲存設定</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認 -->
    <div id="deleteConfirmModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] hidden flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-xs rounded-3xl shadow-2xl p-6">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v2m3 4h.01" />
                </svg>
            </div>
            <h3 class="text-lg font-black text-slate-800 mb-2">確定要刪除？</h3>
            <p class="text-xs text-slate-500 mb-6 font-medium">此動作無法復原。</p>
            <div class="flex gap-2">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold text-xs">取消</button>
                <button id="confirmDeleteAction" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold text-xs active:bg-red-800">確認刪除</button>
            </div>
        </div>
    </div>

    <script>
        // 本機儲存標籤
        const STORAGE_KEY = 'aaron_ledger_v3_local';
        
        let ledgerData = [];
        let currentSplitId = null;
        let pendingDeleteId = null;

        // 計算引擎
        const fix = (n) => Math.round(n * 1e10) / 1e10;
        const trunc = (n) => Math.trunc(fix(n) + (n >= 0 ? 1e-9 : -1e-9));
        const fmt = (n) => new Intl.NumberFormat('zh-TW').format(n);

        // --- 初始化 ---
        window.onload = () => {
            document.getElementById('recordDate').valueAsDate = new Date();
            loadFromStorage();
            updatePreview();
        };

        // --- 儲存核心 ---
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ledgerData));
            showSaveHint();
        }

        function loadFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try { ledgerData = JSON.parse(saved); } catch(e) { ledgerData = []; }
            }
            renderLedger();
        }

        function showSaveHint() {
            const hint = document.getElementById('saveStatus');
            hint.style.opacity = '1';
            setTimeout(() => hint.style.opacity = '0', 800);
        }

        // --- UI 操作 ---
        function unformatAndSelect(el) {
            el.value = el.value.replace(/,/g, '');
            setTimeout(() => el.select(), 50);
        }

        function formatInput(el) {
            let val = el.value.replace(/,/g, '');
            if (val === "" || val === "-") return;
            let num = parseFloat(val);
            if (!isNaN(num)) el.value = num.toLocaleString('en-US');
        }

        function calculateValues() {
            const PA = parseFloat(document.getElementById('playerAmount').value.replace(/,/g, '')) || 0;
            const VB = parseFloat(document.getElementById('validBet').value.replace(/,/g, '')) || 0;
            const rate = parseFloat(document.getElementById('commissionRate').value) || 0;
            const rateHint = document.getElementById('ratePercent');
            if (rateHint) rateHint.innerText = `(= ${fix(rate * 100)}%)`;
            const comm = trunc(VB * rate);
            const after = PA - comm;
            const ref1 = trunc(after * 0.9);
            return { comm, after, ref1, PA, VB, rate };
        }

        function updatePreview() {
            const v = calculateValues();
            document.getElementById('previewCommission').innerText = fmt(v.comm);
            document.getElementById('previewAfterCom').innerText = fmt(v.after);
            document.getElementById('previewRefund1').innerText = fmt(v.ref1);
        }

        function addToLedger() {
            const accEl = document.getElementById('gameAccount');
            const acc = accEl.value.trim();
            if (!acc) return;
            const v = calculateValues();
            const entry = { id: Date.now().toString(), account: acc, date: document.getElementById('recordDate').value, ...v, standRate: 1, agentTotal: v.ref1, agentOwn: v.ref1, splits: [] };
            ledgerData.unshift(entry);
            saveToStorage();
            renderLedger();
            accEl.value = '';
            document.getElementById('playerAmount').value = '';
            document.getElementById('validBet').value = '';
            updatePreview();
        }

        function renderLedger() {
            const body = document.getElementById('ledgerBody');
            const noData = document.getElementById('noData');
            document.getElementById('recordCount').innerText = `${ledgerData.length} RECORDS`;
            if (ledgerData.length === 0) { noData.classList.remove('hidden'); body.innerHTML = ''; return; }
            noData.classList.add('hidden');
            body.innerHTML = ledgerData.map(item => `
                <tr class="active:bg-slate-100 transition-colors" onclick="openSplitModal('${item.id}')">
                    <td class="p-3 text-left">
                        <div class="font-black text-slate-800 text-xs tracking-tighter">${item.account}</div>
                        <div class="text-[8px] text-slate-400 font-bold">${item.date}</div>
                    </td>
                    <td class="p-3 text-right">
                        <div class="font-bold text-indigo-600 font-mono text-[10px]">${fmt(item.comm)}</div>
                        <div class="text-[7px] text-slate-300 font-bold uppercase">Water</div>
                    </td>
                    <td class="p-3 text-right">
                        <div class="font-black text-blue-600 font-mono text-sm tracking-tighter">${fmt(item.ref1)}</div>
                        <div class="text-[7px] text-blue-300 font-bold uppercase text-right">Refund 1</div>
                    </td>
                    <td class="p-3 text-center" onclick="event.stopPropagation()">
                        <button onclick="requestDelete('${item.id}')" class="text-slate-200 p-2 active:text-red-500 text-lg">✕</button>
                    </td>
                </tr>
            `).join('');
        }

        // --- 拆分與手動填寫金額邏輯 ---
        function openSplitModal(id) {
            currentSplitId = id;
            const entry = ledgerData.find(i => i.id === id);
            if (!entry) return;
            document.getElementById('modalAccountTitle').innerText = entry.account;
            document.getElementById('modalRefundSub').innerText = `月退 1 總額: ${fmt(entry.ref1)}`;
            document.getElementById('modalStandRate').value = entry.standRate;
            const container = document.getElementById('splitRowsContainer');
            container.innerHTML = '';
            if (entry.splits && entry.splits.length > 0) entry.splits.forEach(s => addSplitRow(s.name, s.percent, s.amount));
            else addSplitRow();
            document.getElementById('splitModal').classList.remove('hidden');
            document.body.classList.add('modal-active');
            updateSplitCalculations();
        }

        function closeSplitModal() { document.getElementById('splitModal').classList.add('hidden'); document.body.classList.remove('modal-active'); }

        function addSplitRow(name = '', percent = '', amount = '') {
            const container = document.getElementById('splitRowsContainer');
            const row = document.createElement('div');
            row.className = "split-row flex gap-1 items-center bg-slate-50 p-1 rounded-xl";
            row.innerHTML = `
                <input type="text" placeholder="股東" value="${name}" class="split-name flex-grow px-2 py-2 bg-transparent text-xs font-bold focus:outline-none">
                <input type="number" step="any" placeholder="%" class="split-percent w-12 px-1 py-2 bg-white border border-slate-200 rounded-lg text-xs font-black text-right" value="${percent}" oninput="syncFromPercent(this)">
                <input type="text" placeholder="金額" class="split-amount-input w-24 px-1 py-2 bg-indigo-50 border border-indigo-100 rounded-lg text-xs font-black text-right text-indigo-700" value="${amount ? fmt(amount) : ''}" oninput="syncFromAmount(this)" onfocus="unformatAndSelect(this)" onblur="formatInput(this)">
                <button onclick="this.parentElement.remove(); updateSplitCalculations();" class="text-slate-300 p-1">✕</button>
            `;
            container.appendChild(row);
        }

        function syncFromPercent(el) {
            const entry = ledgerData.find(i => i.id === currentSplitId);
            const p = parseFloat(el.value) || 0;
            el.closest('.split-row').querySelector('.split-amount-input').value = fmt(trunc(entry.ref1 * (p / 100)));
            updateSplitCalculations();
        }

        function syncFromAmount(el) {
            const entry = ledgerData.find(i => i.id === currentSplitId);
            const amt = parseFloat(el.value.replace(/,/g, '')) || 0;
            if (entry.ref1 !== 0) el.closest('.split-row').querySelector('.split-percent').value = fix((amt / entry.ref1) * 100);
            updateSplitCalculations();
        }

        function updateSplitCalculations() {
            const entry = ledgerData.find(i => i.id === currentSplitId);
            const sr = parseFloat(document.getElementById('modalStandRate').value) || 0;
            const totalAgent = trunc(entry.ref1 * sr);
            document.getElementById('modalStandDisplay').innerText = `${fix(sr * 100)}%`;
            document.getElementById('modalAgentTotal').innerText = fmt(totalAgent);
            let ta = 0, tp = 0;
            document.querySelectorAll('.split-row').forEach(row => {
                tp += parseFloat(row.querySelector('.split-percent').value) || 0;
                ta += parseFloat(row.querySelector('.split-amount-input').value.replace(/,/g, '')) || 0;
            });
            document.getElementById('remainingPercent').innerText = `${fix(100 - tp)}%`;
            const own = totalAgent - ta;
            const ownEl = document.getElementById('modalAgentOwn');
            ownEl.innerText = fmt(own);
            ownEl.className = own < 0 ? "text-xl font-black text-red-600 font-mono text-right" : "text-xl font-black text-emerald-700 font-mono text-right";
        }

        function saveSplits() {
            const index = ledgerData.findIndex(i => i.id === currentSplitId);
            const entry = ledgerData[index];
            const sr = parseFloat(document.getElementById('modalStandRate').value) || 0;
            const splits = []; let ta = 0;
            document.querySelectorAll('.split-row').forEach(row => {
                const n = row.querySelector('.split-name').value.trim();
                const p = parseFloat(row.querySelector('.split-percent').value) || 0;
                const a = parseFloat(row.querySelector('.split-amount-input').value.replace(/,/g, '')) || 0;
                if (n || p > 0 || a !== 0) { splits.push({ name: n, percent: p, amount: a }); ta += a; }
            });
            ledgerData[index] = { ...entry, standRate: sr, agentTotal: trunc(entry.ref1 * sr), agentOwn: trunc(entry.ref1 * sr) - ta, splits };
            saveToStorage();
            closeSplitModal();
        }

        // --- 刪除確認 ---
        function requestDelete(id) { pendingDeleteId = id; document.getElementById('deleteConfirmModal').classList.remove('hidden'); document.body.classList.add('modal-active'); }
        function closeDeleteModal() { document.getElementById('deleteConfirmModal').classList.add('hidden'); document.body.classList.remove('modal-active'); pendingDeleteId = null; }
        document.getElementById('confirmDeleteAction').onclick = () => { if (pendingDeleteId) { ledgerData = ledgerData.filter(i => i.id !== pendingDeleteId); saveToStorage(); renderLedger(); closeDeleteModal(); } };

    </script>
</body>
</html>
